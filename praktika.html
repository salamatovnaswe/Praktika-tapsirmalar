<!DOCTYPE html>
<html>
    <head>
        <title>Praktika tapsirmalar</title>
        <style>
             a:hover{
                transition-duration: 3s;
                transition-property: color;
                color:yellow
            }
            h1:hover{
                text-shadow: 2px -2px 2px black;
                transition-duration: 2s;
                transition-property: all;
            }
            .alma:hover{
                color: white;
                background-color: green;
                transition-duration: 3s;
                transition-property: all;
            }
            .pomidor:hover{
                color: white;
                background-color: red;
                transition-duration: 3s;
                transition-property: all;
            }
            .banan:hover{
                color: white;
                background-color: yellow;
                transition-duration: 3s;
                transition-property: all;
            }
            .sebet:hover{
                border: 2px dotted orangered;
                background-color: white;
                transition-duration: 1s;
                transition-property: all;
                color: orangered;
            }
            .satti:hover{
                color: white;
                background-color: green;
                transition-duration: 3s;
                transition-property: all;
                box-shadow: -3px -3px 5px green;
                border: none;

        </style>
    </head>
    <body>
        <a href="https//www.Uzum.com">Uzum nan satip aliw</a>
        <h1>Miyweler</h1>
        <p>Alma</p>
        <p>Pomidor</p>
        <p>Banan</p>
        <button class="sebet">SEBET</button>
        <button class="satip aliw">SATIP ALIW</button> 
    </body>
</html>
